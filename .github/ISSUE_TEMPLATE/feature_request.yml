name: Feature request
description: Suggest an improvement to NotebookLens.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Tell us what pain point you are trying to solve.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
