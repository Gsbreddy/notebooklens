name: Bug report
description: Report a reproducible NotebookLens bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce the issue.
  - type: input
    id: notebooklens-version
    attributes:
      label: NotebookLens version
      description: For example `v0.1.0` or `main`.
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runner image, Python version, and any relevant setup details.
      placeholder: ubuntu-latest, Python 3.12
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open PR with changed notebook
        2. Run NotebookLens action
        3. Observe failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the relevant `notebooklens.runtime` or `notebooklens.comment_sync` output if available.
      render: shell
